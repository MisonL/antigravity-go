<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity-Go (AGo) - AI 编程助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
        }

        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-weight: 600;
            color: #495057;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            min-height: 500px;
        }

        .editor-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .panel-title {
            font-weight: 600;
            color: #495057;
        }

        .code-editor, .result-panel {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            overflow: auto;
        }

        .code-editor {
            background: #f8f9fa;
            color: #333;
        }

        .code-editor:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-panel {
            background: #fff;
            color: #495057;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Antigravity-Go</h1>
            <p>Antigravity-Go (AGo) AI 编程助手</p>
        </div>

        <div class="content">
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator"></div>
                <span class="status-text" id="statusText">未连接</span>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="connectBtn" onclick="connect()">
                    连接服务器
                </button>
                <button class="btn btn-secondary" id="initializeBtn" onclick="initialize()" disabled>
                    初始化 LSP
                </button>
                <button class="btn btn-secondary" id="completionBtn" onclick="requestCompletion()" disabled>
                    代码补全
                </button>
                <button class="btn btn-secondary" id="hoverBtn" onclick="requestHover()" disabled>
                    悬停提示
                </button>
            </div>

            <div class="editor-container">
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="panel-title">代码编辑器</span>
                    </div>
                    <textarea class="code-editor" id="codeEditor" placeholder="在这里输入你的代码...">
package main

import "fmt"

func main() {
    fmt.Println("Hello, Antigravity-Go!")
}
                    </textarea>
                </div>

                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="panel-title">结果面板</span>
                    </div>
                    <div class="result-panel" id="resultPanel">
                        等待操作...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        let isConnected = false;
        let isInitialized = false;

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');

            if (connected) {
                indicator.classList.add('connected');
                text.textContent = '已连接';
            } else {
                indicator.classList.remove('connected');
                text.textContent = '未连接';
            }
        }

        function appendResult(message) {
            const panel = document.getElementById('resultPanel');
            panel.innerHTML += `<div style="margin-bottom: 10px; padding: 10px; background: #f8f9fa; border-radius: 5px;">${message}</div>`;
            panel.scrollTop = panel.scrollHeight;
        }

        async function connect() {
            try {
                appendResult('正在连接到代理服务器...');

                const response = await fetch(`${API_BASE}/initialize`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    appendResult('连接成功');
                    appendResult(`响应: ${JSON.stringify(data, null, 2)}`);

                    isConnected = true;
                    isInitialized = true;
                    updateStatus(true);

                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('initializeBtn').disabled = false;
                    document.getElementById('completionBtn').disabled = false;
                    document.getElementById('hoverBtn').disabled = false;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                appendResult(`连接失败: ${error.message}`);
            }
        }

        async function initialize() {
            try {
                appendResult('正在初始化 LSP...');

                const response = await fetch(`${API_BASE}/initialize`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    appendResult('LSP 初始化成功');
                    appendResult(`响应: ${JSON.stringify(data, null, 2)}`);

                    // 打开文档
                    await openDocument();
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                appendResult(`初始化失败: ${error.message}`);
            }
        }

        async function openDocument() {
            const code = document.getElementById('codeEditor').value;
            const uri = 'file:///test_file.go';

            try {
                appendResult('正在打开文档...');

                const response = await fetch(`${API_BASE}/didOpen`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uri: uri,
                        languageId: 'go',
                        text: code,
                    }),
                });

                if (response.ok) {
                    appendResult('文档打开成功');
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                appendResult(`打开文档失败: ${error.message}`);
            }
        }

        async function requestCompletion() {
            const uri = 'file:///test_file.go';

            try {
                appendResult('正在请求代码补全...');

                const response = await fetch(`${API_BASE}/completion`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uri: uri,
                        line: 3,
                        character: 10,
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    appendResult('代码补全成功');
                    appendResult(`响应: ${JSON.stringify(data, null, 2)}`);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                appendResult(`代码补全失败: ${error.message}`);
            }
        }

        async function requestHover() {
            const uri = 'file:///test_file.go';

            try {
                appendResult('正在请求悬停提示...');

                const response = await fetch(`${API_BASE}/hover`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uri: uri,
                        line: 2,
                        character: 8,
                    }),
                });

                if (response.ok) {
                    const data = await response.json();
                    appendResult('悬停提示成功');
                    appendResult(`响应: ${JSON.stringify(data, null, 2)}`);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                appendResult(`悬停提示失败: ${error.message}`);
            }
        }

        // 自动更新文档内容
        document.getElementById('codeEditor').addEventListener('input', async function() {
            if (!isInitialized) return;

            const code = this.value;
            const uri = 'file:///test_file.go';

            try {
                await fetch(`${API_BASE}/didChange`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uri: uri,
                        version: 1,
                        text: code,
                    }),
                });
            } catch (error) {
                console.error('更新文档失败:', error);
            }
        });
    </script>
</body>
</html>
