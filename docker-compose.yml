name: antigravity-go

services:
  ago:
    build:
      context: .
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8888:8888"
    environment:
      # 必填：用于允许 Web 监听 0.0.0.0，并保护 /ws 与 /api
      AGO_WEB_TOKEN: ${AGO_WEB_TOKEN:?请在 .env 或环境变量中设置 AGO_WEB_TOKEN}
      # 可选：LLM Key（更推荐用宿主机环境变量注入）
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      GEMINI_API_KEY: ${GEMINI_API_KEY-}
    command:
      - --web
      - --no-tui
      - --web-host
      - 0.0.0.0
      - --port
      - "8888"
      - --token
      - ${AGO_WEB_TOKEN}
      - --bin
      - ./antigravity_core
